services:
  postgres:
    image: postgres:16-alpine
    container_name: emergency-dispatch-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: dispatch
      POSTGRES_PASSWORD: dispatch123
      POSTGRES_DB: emergency_dispatch
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dispatch -d emergency_dispatch"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
